apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ShrenikMehar/StudentManagement
    targetRevision: main
    path: infra/helm/student-api
    helm:
      valuesObject:
        config:
          dbHost: postgres
          dbPort: "5432"
          dbName: students
        secret:
          dbUser: postgres
          dbPassword: postgres
        vaultToken: root
  destination:
    server: https://kubernetes.default.svc
    namespace: student-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
