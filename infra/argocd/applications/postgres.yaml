apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ShrenikMehar/StudentManagement
    targetRevision: main
    path: infra/helm/postgres
    helm:
      valuesObject:
        auth:
          username: postgres
          password: postgres
          database: students
  destination:
    server: https://kubernetes.default.svc
    namespace: student-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
