name: CI Pipeline

on:
  push:
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  ci:
    name: Build, Test, Lint & Publish Image
    runs-on: self-hosted

    env:
      VERSION: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build, Lint & Test
        run: make local-build

      - name: Build Docker Image
        run: docker build -t student-api:${VERSION} .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag student-api:${VERSION} ${{ secrets.DOCKER_USERNAME }}/student-api:${VERSION}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-api:${VERSION}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/tag: .*/tag: \"${VERSION}\"/" infra/helm/student-api/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/student-api/values.yaml
          git commit -m "ci: update image tag to ${VERSION}"
          git push
