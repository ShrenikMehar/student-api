name: CI Pipeline

on:
  push:
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build API
        run: make local-build

      - name: Run Tests
        run: make local-test

      - name: Run Lint
        run: make lint

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: make build

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-api:1.0.0
